<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Integrated Marketing Dashboard</title>
    <!-- Tailwind CSS (디자인) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js (그래프 시각화) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Chart.js 데이터 라벨 플러그인 (그래프 위에 숫자 표시) -->
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0"></script>
    <!-- SheetJS (엑셀 읽기/쓰기 기능) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;800;900&display=swap');
        body { 
            font-family: 'Pretendard', sans-serif; 
            background-color: #ffffff; 
            color: #1e293b; 
        }
        .card { @apply bg-white p-8 rounded-[2rem] border border-gray-100 shadow-md transition-all; }
        .input-box { @apply w-full px-4 py-2 border-2 border-gray-100 rounded-xl text-center font-bold text-gray-700 focus:outline-none focus:border-indigo-400 transition-all; }
        th { @apply bg-slate-50 text-slate-500 py-3 text-xs font-bold tracking-wider uppercase text-center border-b; }
        td { @apply py-4 text-center border-b text-sm font-bold text-slate-700; }
        
        .navy-title {
            color: #0f172a; 
            font-weight: 900;
            font-size: 2.25rem; 
            letter-spacing: -0.05em;
            text-shadow: 2px 2px 4px rgba(15, 23, 42, 0.15); 
        }
        .btn-action { @apply font-black px-5 py-3 rounded-2xl shadow-md transition-all flex items-center gap-2 text-sm; }
    </style>
</head>
<body class="py-12 px-4 md:px-8">

    <div class="max-w-6xl mx-auto space-y-10">
        
        <!-- 상단 헤더 섹션 -->
        <header class="flex flex-col md:flex-row md:items-center justify-between border-b border-slate-100 pb-8 gap-4">
            <div class="flex flex-col sm:flex-row items-start sm:items-center gap-4 order-2 md:order-1">
                <button onclick="downloadExcel()" class="bg-emerald-600 hover:bg-emerald-700 text-white btn-action shadow-emerald-600/10">
                    🟢 엑셀 보고서 다운로드
                </button>
                <p class="text-xs font-bold text-slate-400">네이버 파워링크 / 쇼핑검색 / 메타 성과 관리</p>
            </div>
            <div class="text-left md:text-right order-1 md:order-2">
                <h1 class="navy-title">통합 매체 보고서 정리</h1>
            </div>
        </header>

        <!-- 📂 [신규] 데이터 가져오기 함 (엑셀 파일 업로드) -->
        <div class="card border-2 border-dashed border-slate-200 bg-slate-50/50 hover:bg-slate-50 transition-all">
            <h2 class="text-base font-black mb-3 text-slate-800 flex items-center gap-2">📁 내 데이터 가져오기 (Excel 업로드 함)</h2>
            <p class="text-xs text-slate-400 mb-4">첫 번째 행에 매체구분, 광고비, 노출수, 클릭수, 매출액 순서로 적힌 엑셀 파일을 넣어주시면 자동으로 입력됩니다.</p>
            <input type="file" id="excel-uploader" accept=".xlsx, .xls" onchange="uploadExcel(this)" class="block w-full text-sm text-slate-500 file:mr-4 file:py-2.5 file:px-4 file:rounded-xl file:border-0 file:text-sm file:font-black file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100 cursor-pointer">
        </div>

        <!-- 1. 데이터 입력 및 편집 섹션 -->
        <div class="card">
            <h2 class="text-lg font-black mb-6 text-slate-800">✍️ 매체별 데이터 입력 및 검토</h2>
            <div class="overflow-x-auto">
                <table class="w-full min-w-[600px]">
                    <thead>
                        <tr>
                            <th>매체 구분</th>
                            <th>광고비 (Spend)</th>
                            <th>노출수 (Imp)</th>
                            <th>클릭수 (Click)</th>
                            <th>매출액 (Revenue)</th>
                            <th>ROAS (%)</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr id="row-powerlink">
                            <td class="font-extrabold text-blue-600">네이버 파워링크</td>
                            <td><input type="number" id="p-spend" value="1500000" oninput="calculateRow('p')" class="input-box"></td>
                            <td><input type="number" id="p-imp" value="500000" class="input-box"></td>
                            <td><input type="number" id="p-click" value="12000" class="input-box"></td>
                            <td><input type="number" id="p-rev" value="4500000" oninput="calculateRow('p')" class="input-box"></td>
                            <td id="p-roas" class="font-black text-slate-900 text-base">300%</td>
                        </tr>
                        <tr id="row-shopping">
                            <td class="font-extrabold text-emerald-600">네이버 쇼핑검색</td>
                            <td><input type="number" id="s-spend" value="2000000" oninput="calculateRow('s')" class="input-box"></td>
                            <td><input type="number" id="s-imp" value="400000" class="input-box"></td>
                            <td><input type="number" id="s-click" value="15000" class="input-box"></td>
                            <td><input type="number" id="s-rev" value="8000000" oninput="calculateRow('s')" class="input-box"></td>
                            <td id="s-roas" class="font-black text-slate-900 text-base">400%</td>
                        </tr>
                        <tr id="row-meta">
                            <td class="font-extrabold text-purple-600">메타 (FB/IG)</td>
                            <td><input type="number" id="m-spend" value="1800000" oninput="calculateRow('m')" class="input-box"></td>
                            <td><input type="number" id="m-imp" value="800000" class="input-box"></td>
                            <td><input type="number" id="m-click" value="24000" class="input-box"></td>
                            <td><input type="number" id="m-rev" value="3600000" oninput="calculateRow('m')" class="input-box"></td>
                            <td id="m-roas" class="font-black text-slate-900 text-base">200%</td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div class="mt-6 text-right">
                <button onclick="updateDashboard()" class="bg-slate-900 hover:bg-black text-white font-black px-6 py-3.5 rounded-2xl shadow-lg shadow-slate-900/10 transition-all inline-block">
                    🔄 수동 입력값 그래프 반영하기
                </button>
            </div>
        </div>

        <!-- 2. 시각화 그래프 대시보드 (누끼 다운로드 버튼 배치) -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <!-- 그래프 1 -->
            <div class="card flex flex-col justify-between">
                <div>
                    <div class="flex items-center justify-between mb-4">
                        <h3 class="text-base font-black text-slate-700">📈 매체별 주요 성과 비교</h3>
                        <button onclick="downloadChartPng('mixedChart', '매체별_성과_비교_그래프')" class="bg-indigo-50 hover:bg-indigo-100 text-indigo-700 font-bold px-3 py-1.5 rounded-xl text-xs transition-all">
                            📸 누끼 이미지 다운
                        </button>
                    </div>
                    <div class="h-80"><canvas id="mixedChart"></canvas></div>
                </div>
            </div>
            <!-- 그래프 2 -->
            <div class="card flex flex-col justify-between">
                <div>
                    <div class="flex items-center justify-between mb-4">
                        <h3 class="text-base font-black text-slate-700">🍕 매체별 매출액 기여도 비중</h3>
                        <button onclick="downloadChartPng('pieChart', '매체별_매출_비중_그래프')" class="bg-indigo-50 hover:bg-indigo-100 text-indigo-700 font-bold px-3 py-1.5 rounded-xl text-xs transition-all">
                            📸 누끼 이미지 다운
                        </button>
                    </div>
                    <div class="h-80"><canvas id="pieChart"></canvas></div>
                </div>
            </div>
        </div>

    </div>

    <script>
        // 숫자가 차트 위에 고정되어 나오도록 플러그인 글로벌 등록
        Chart.register(ChartDataLabels);

        let mixedChart = null;
        let pieChart = null;

        function calculateRow(prefix) {
            const spend = parseFloat(document.getElementById(`${prefix}-spend`).value) || 0;
            const rev = parseFloat(document.getElementById(`${prefix}-rev`).value) || 0;
            const roasCell = document.getElementById(`${prefix}-roas`);
            roasCell.innerText = spend > 0 ? Math.round((rev / spend) * 100) + '%' : '0%';
        }

        // 📂 외부 파일 업로드 함 처리 로직
        function uploadExcel(input) {
            if (!input.files[0]) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                const sheetName = workbook.SheetNames[0];
                const sheet = workbook.Sheets[sheetName];
                const json = XLSX.utils.sheet_to_json(sheet, {header: 1});

                // 2번째 행부터 읽어서 각각 매칭 (파워링크, 쇼핑, 메타 순서 매칭 가정)
                const mapping = { '파워링크': 'p', '쇼핑': 's', '메타': 'm' };
                
                for(let i = 1; i < json.length; i++) {
                    const row = json[i];
                    if(!row[0]) continue;
                    
                    let prefix = '';
                    if(row[0].includes('파워링크')) prefix = 'p';
                    else if(row[0].includes('쇼핑')) prefix = 's';
                    else if(row[0].includes('메타')) prefix = 'm';

                    if(prefix) {
                        document.getElementById(`${prefix}-spend`).value = row[1] || 0;
                        document.getElementById(`${prefix}-imp`).value = row[2] || 0;
                        document.getElementById(`${prefix}-click`).value = row[3] || 0;
                        document.getElementById(`${prefix}-rev`).value = row[4] || 0;
                        calculateRow(prefix);
                    }
                }
                updateDashboard();
            };
            reader.readAsArrayBuffer(input.files[0]);
        }

        function updateDashboard() {
            const media = ['파워링크', '쇼핑검색', '메타'];
            const spends = [
                parseFloat(document.getElementById('p-spend').value) || 0,
                parseFloat(document.getElementById('s-spend').value) || 0,
                parseFloat(document.getElementById('m-spend').value) || 0
            ];
            const revs = [
                parseFloat(document.getElementById('p-rev').value) || 0,
                parseFloat(document.getElementById('s-rev').value) || 0,
                parseFloat(document.getElementById('m-rev').value) || 0
            ];

            // 1. 혼합 성과 차트 (수치 표시 + 투명 배경 옵션)
            const ctxMixed = document.getElementById('mixedChart').getContext('2d');
            if (mixedChart) mixedChart.destroy();
            mixedChart = new Chart(ctxMixed, {
                data: {
                    labels: media,
                    datasets: [
                        { type: 'bar', label: '매출액 (원)', data: revs, backgroundColor: ['#3b82f6', '#10b981', '#a855f7'], borderRadius: 12 },
                        { type: 'line', label: '광고비 (원)', data: spends, borderColor: '#ef4444', borderWidth: 3, pointBackgroundColor: '#ef4444', fill: false }
                    ]
                },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false,
                    plugins: { 
                        legend: { position: 'top' },
                        datalabels: { // 막대나 포인트 위에 숫자 고정 표시
                            anchor: 'end',
                            align: 'top',
                            font: { weight: 'bold', family: 'Pretendard' },
                            formatter: (value) => value.toLocaleString()
                        }
                    }
                }
            });

            // 2. 도넛 비중 차트
            const ctxPie = document.getElementById('pieChart').getContext('2d');
            if (pieChart) pieChart.destroy();
            pieChart = new Chart(ctxPie, {
                type: 'doughnut',
                data: {
                    labels: media,
                    datasets: [{ data: revs, backgroundColor: ['#3b82f6', '#10b981', '#a855f7'], borderWidth: 0 }]
                },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false, 
                    plugins: { 
                        legend: { position: 'right' },
                        datalabels: {
                            font: { weight: 'bold', family: 'Pretendard' },
                            formatter: (value, ctx) => {
                                let sum = 0;
                                let dataArr = ctx.chart.data.datasets[0].data;
                                dataArr.map(data => { sum += data; });
                                let percentage = (value*100 / sum).toFixed(1)+"%";
                                return percentage;
                            },
                            color: '#ffffff'
                        }
                    }
                }
            });
        }

        // 📸 누끼 따인 깨끗한 이미지(투명배경 PNG) 다운로드 함수
        function downloadChartPng(chartId, filename) {
            const canvas = document.getElementById(chartId);
            // 배경 없이 데이터와 그래프선만 있는 상태로 데이터 주소 생성
            const imgUrl = canvas.toDataURL('image/png');
            
            const link = document.createElement('a');
            link.download = `${filename}.png`;
            link.href = imgUrl;
            link.click();
        }

        function downloadExcel() {
            const data = [
                ["매체 구분", "광고비", "노출수", "클릭수", "매출액", "ROAS"],
                ["네이버 파워링크", parseInt(document.getElementById('p-spend').value), parseInt(document.getElementById('p-imp').value), parseInt(document.getElementById('p-click').value), parseInt(document.getElementById('p-rev').value), document.getElementById('p-roas').innerText],
                ["네이버 쇼핑검색", parseInt(document.getElementById('s-spend').value), parseInt(document.getElementById('s-imp').value), parseInt(document.getElementById('s-click').value), parseInt(document.getElementById('s-rev').value), document.getElementById('s-roas').innerText],
                ["메타 (FB/IG)", parseInt(document.getElementById('m-spend').value), parseInt(document.getElementById('m-imp').value), parseInt(document.getElementById('m-click').value), parseInt(document.getElementById('m-rev').value), document.getElementById('m-roas').innerText]
            ];
            const workbook = XLSX.utils.book_new();
            const worksheet = XLSX.utils.aoa_to_sheet(data);
            XLSX.utils.book_append_sheet(workbook, worksheet, "통합매체성과");
            XLSX.writeFile(workbook, `통합_매체_성과_보고서_${new Date().toISOString().slice(0,10)}.xlsx`);
        }

        window.onload = function() {
            updateDashboard();
        };
    </script>
</body>
</html>
